<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PantryIQ">
<link rel="manifest" href="/pantryiq/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>PantryIQ</title>
<style>
:root{
  --bg:#0a0a0f;--s1:#13131f;--s2:#1c1c2e;--s3:#252538;--s4:#2e2e45;
  --acc:#7b6fff;--acc-dim:rgba(123,111,255,0.12);
  --tx:#f0eeff;--t2:#9896b8;--t3:#55537a;
  --red:#ff5252;--red-d:rgba(255,82,82,0.1);--red-b:rgba(255,82,82,0.22);
  --ora:#ff8c42;--ora-d:rgba(255,140,66,0.1);
  --amb:#ffb526;--amb-d:rgba(255,181,38,0.1);--amb-b:rgba(255,181,38,0.22);
  --grn:#34d399;--grn-d:rgba(52,211,153,0.07);--grn-b:rgba(52,211,153,0.2);
  --border:rgba(255,255,255,0.055);
  --font:'DM Sans',-apple-system,sans-serif;
  --mono:'DM Mono',monospace;
  --r:16px;--rsm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--tx);max-width:430px;margin:0 auto;overflow-x:hidden}

/* SETUP */
.setup{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.setup.hidden{display:none}
.setup-logo{font-size:52px;margin-bottom:20px}
.setup-title{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px}
.setup-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:32px;max-width:300px}
.setup-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:8px;text-align:left;width:100%}
.setup-input{width:100%;padding:14px 16px;background:var(--s1);border:1.5px solid var(--s4);border-radius:var(--r);color:var(--tx);font-family:var(--font);font-size:16px;font-weight:600;outline:none;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.setup-input:focus{border-color:var(--acc)}
.setup-input::placeholder{color:var(--t3);text-transform:none;letter-spacing:0;font-weight:400}
.setup-hint{font-size:11px;color:var(--t3);line-height:1.6;margin-bottom:20px}
.setup-btn{width:100%;padding:15px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s}
.setup-btn:disabled{opacity:0.35;cursor:not-allowed}
.setup-btn:not(:disabled):active{transform:scale(0.98)}
.chips-wrap{margin-top:24px;width:100%}
.chips-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:10px;text-align:left}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:24px;padding:8px 14px;margin:4px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.chip-x{color:var(--t3);font-size:16px}
.chip-x:hover{color:var(--red)}

/* HDR */
.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;padding:env(safe-area-inset-top,0) 0 0;background:rgba(10,10,15,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.hdr-i{display:flex;align-items:center;justify-content:space-between;padding:13px 20px 12px}
.logo{font-size:18px;font-weight:600;letter-spacing:-0.4px}
.logo b{color:var(--acc)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-code{font-size:11px;color:var(--t3);background:var(--s2);border:1px solid var(--border);padding:4px 10px;border-radius:12px;cursor:pointer;font-weight:500}
.hdr-code:hover{border-color:var(--acc);color:var(--acc)}
.hdr-sync{font-size:11px;color:var(--t3)}
.add-btn{background:var(--acc);color:#fff;border:none;border-radius:20px;padding:7px 15px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}
.add-btn:active{transform:scale(0.96)}

/* MAIN */
.main{padding-top:70px;padding-bottom:86px}
.page{display:none;padding:0 16px 16px}
.page.active{display:block}

/* LOADING STATE */
.loading-state{text-align:center;padding:60px 20px}
.loading-spinner{width:36px;height:36px;border:2px solid var(--s3);border-top-color:var(--acc);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--t2)}

/* HERO */
.hero{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;margin:14px 0 10px;position:relative;overflow:hidden}
.hero-eye{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:8px}
.hero-h{font-size:24px;font-weight:600;letter-spacing:-0.4px;line-height:1.25;margin-bottom:5px}
.c-red{color:var(--red)}.c-ora{color:var(--ora)}.c-amb{color:var(--amb)}.c-grn{color:var(--grn)}
.hero-sub{font-size:13px;color:var(--t2);line-height:1.55}
.order-btn{width:100%;margin-top:15px;padding:13px;border-radius:12px;background:var(--acc);color:#fff;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.order-btn:active{transform:scale(0.98)}

/* ITEM CARDS */
.items{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;animation:fu 0.2s ease both}
.item:active{transform:scale(0.985)}
.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.item.cat-a::before{background:var(--red)}
.item.cat-b::before{background:var(--ora)}
.item.cat-c::before{background:var(--amb)}
.item.safe::before{background:var(--grn)}
.item.cat-a{background:rgba(255,82,82,0.04)}
.item.cat-b{background:rgba(255,140,66,0.03)}
.ie{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.item.cat-a .ie{background:rgba(255,82,82,0.12)}
.item.cat-b .ie{background:rgba(255,140,66,0.1)}
.item.cat-c .ie{background:rgba(255,181,38,0.1)}
.item.safe .ie{background:rgba(52,211,153,0.08)}
.ib{flex:1;min-width:0}
.in{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px}
.im{font-size:11px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:0.2px}
.tag-a{background:rgba(255,82,82,0.15);color:var(--red)}
.tag-b{background:rgba(255,140,66,0.15);color:var(--ora)}
.tag-c{background:rgba(255,181,38,0.15);color:var(--amb)}
.ir{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dp{font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;font-family:var(--mono)}
.dp.cat-a{background:var(--red-d);color:var(--red)}
.dp.cat-b{background:var(--ora-d);color:var(--ora)}
.dp.cat-c{background:var(--amb-d);color:var(--amb)}
.dp.safe{background:var(--grn-d);color:var(--grn)}
.od{font-size:10px;color:var(--t3);font-family:var(--mono)}

/* BNAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);padding-bottom:env(safe-area-inset-bottom,0)}
.nb{display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;border:none;background:none;color:var(--t3);font-family:var(--font);font-size:10px;font-weight:500;gap:4px;transition:color 0.15s;letter-spacing:0.3px}
.nb.active{color:var(--acc)}
.ni{font-size:20px;line-height:1}

/* TOAST */
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);color:var(--tx);padding:10px 18px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:all 0.22s;z-index:300;border:1px solid var(--border);white-space:nowrap;max-width:calc(100% - 40px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-logo">🏠</div>
  <div class="setup-title">Welcome to PantryIQ</div>
  <div class="setup-sub">Enter your household name to access your pantry. Each household has its own private data.</div>
  <div class="setup-label">Your Household Name</div>
  <input class="setup-input" id="setup-inp" type="text" maxlength="20"
    placeholder="e.g. HOME1"
    oninput="onSetupInput(this)"
    onkeydown="if(event.key==='Enter')setupGo()">
  <button class="setup-btn" id="setup-btn" onclick="setupGo()" disabled>Enter My Pantry →</button>
  <div class="chips-wrap" id="chips-wrap" style="display:none">
    <div class="chips-label">Or switch to existing</div>
    <div id="chips"></div>
  </div>
</div>

<header class="hdr">
  <div class="hdr-i">
    <div class="logo">Pantry<b>IQ</b></div>
    <div class="hdr-right">
      <div class="hdr-sync" id="hdr-sync"></div>
      <div class="hdr-code" id="hdr-code" onclick="showSetup()"></div>
      <button class="add-btn" onclick="go('add')">+ Add Bill</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="page active" id="page-home"><div id="home-c"></div></div>

  <div class="page" id="page-add">
    <div style="padding:18px 0 4px">
      <div style="font-size:22px;font-weight:600;letter-spacing:-0.3px">Add Bills</div>
      <div style="font-size:13px;color:var(--t2);margin-top:4px">Paste your order confirmation text.</div>
    </div>
    <div class="add-card">
      <textarea id="inv-txt" placeholder="Paste Swiggy email text here..."></textarea>
      <button class="btn btn-p" onclick="parse()">Add Order</button>
    </div>
    <div id="preview"></div>
    <div id="hist" style="margin-top:16px"></div>
  </div>

  <div class="page" id="page-insights"><div id="ins-c"></div></div>
</main>

<nav class="bnav">
  <button class="nb active" id="nb-home" onclick="go('home')"><span class="ni">🏠</span>Dashboard</button>
  <button class="nb" id="nb-add" onclick="go('add')"><span class="ni">➕</span>Add Bill</button>
  <button class="nb" id="nb-insights" onclick="go('insights')"><span class="ni">📈</span>Insights</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// --- CONFIG & SUPABASE ---
const SB_URL = 'https://hkrxlerbmnilddbninbc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcnhsZXJibW5pbGRkYm5pbmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDkxMDMsImV4cCI6MjA5MDI4NTEwM30.3eui_iQ3v5HqW8LQSAVb4hiCciCEBtGxRZkgLj8HhD0';

async function sbFetch(path, opts={}){
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer||'',
      ...opts.headers
    },
    ...opts
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// --- DATA INGESTION (UPDATED FOR BASE_PRODUCT) ---
function buildItemsFromRows(rows) {
  const items = {};
  for (const row of rows) {
    // 1. Group by base_product if available, fallback to item_name
    const key = row.base_product || row.item_name || 'unknown';
    
    if (!items[key]) {
      items[key] = {
        name: row.base_product || row.item_name || 'Unknown Item',
        unit: row.unit || 'pcs',
        purchases: []
      };
    }
    
    if (row.purchase_date) {
      items[key].purchases.push({
        date: row.purchase_date,
        qty: row.qty || 1
      });
    }
  }
  for (const k of Object.keys(items)) {
    items[k].purchases.sort((a, b) => new Date(a.date) - new Date(b.date));
  }
  return items;
}

// --- HOUSEHOLD HELPERS ---
const HH_ACTIVE_KEY = 'piq_active';
function getActive(){return localStorage.getItem(HH_ACTIVE_KEY)}
function setActive(c){localStorage.setItem(HH_ACTIVE_KEY,c)}

async function loadAndRender(){
  const hh = getActive();
  if(!hh) return;
  const hc = document.getElementById('home-c');
  hc.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div></div>';
  
  try {
    const rows = await sbFetch(`purchases?household=eq.${encodeURIComponent(hh)}&order=purchase_date.asc`);
    _cache = buildItemsFromRows(rows);
    renderHome();
    renderInsights();
  } catch(e) {
    toast('❌ Error: ' + e.message);
  }
}

// --- EMOJI & RENDER ---
const EM={lemon:'🍋',chicken:'🍗',egg:'🥚',onion:'🧅',coriander:'🌿',bread:'🍞',milk:'🥛',curd:'🥛',spinach:'🥬',tomato:'🍅',chilli:'🌶',garlic:'🧄',cucumber:'🥒',banana:'🍌',potato:'🥔',ginger:'🫚',default:'🛒'};
function em(n){const l=n.toLowerCase();for(const[k,v]of Object.entries(EM)){if(l.includes(k))return v}return EM.default}

function renderHome(){
  const c = document.getElementById('home-c');
  const forecasts = forecast(_cache);
  const items = classify(_cache, forecasts);
  
  const urgent = items.filter(i => i.bucket !== 'safe');
  
  let html = `<div class="hero">
    <div class="hero-eye">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}</div>
    <div class="hero-h">${urgent.length} items to order</div>
    <div class="hero-sub">${items.length} total products tracked</div>
  </div>`;

  html += `<div class="items">${items.map(i => `
    <div class="item ${i.bucket}">
      <div class="ie">${em(i.name)}</div>
      <div class="ib">
        <div class="in">${i.name}</div>
        <div class="im">last: ${i.lastBought} · ${i.n}x</div>
      </div>
      <div class="ir">
        <div class="dp ${i.bucket}">${i.daysLeft}d</div>
      </div>
    </div>
  `).join('')}</div>`;
  c.innerHTML = html;
}

// --- LOGIC ENGINE ---
function forecast(items) {
  const today = new Date();
  return Object.entries(items).map(([key, d]) => {
    const ps = d.purchases;
    const last = new Date(ps[ps.length-1].date);
    let freq = 30;
    if(ps.length > 1) {
      const span = (new Date(ps[ps.length-1].date) - new Date(ps[0].date)) / 86400000;
      freq = Math.max(3, span / (ps.length-1));
    }
    const daysSince = (today - last) / 86400000;
    const daysLeft = Math.max(0, Math.round(freq - daysSince));
    return { name: d.name, daysLeft, n: ps.length, lastBought: last.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) };
  }).sort((a,b) => a.daysLeft - b.daysLeft);
}

function classify(items, forecasts) {
  return forecasts.map(i => {
    let bucket = 'safe';
    if(i.daysLeft <= 2) bucket = 'cat-a';
    else if(i.daysLeft <= 7) bucket = 'cat-b';
    return {...i, bucket};
  });
}

// --- SAVE (UPDATED TO PUSH BASE_PRODUCT) ---
async function saveInv() {
  const hh = getActive();
  const rows = _pending.items.map(item => ({
    household: hh,
    item_key: null, 
    item_name: item.name,
    base_product: item.name, // Will be cleaned by n8n
    purchase_date: _pending.order_date,
    qty: item.qty
  }));
  await sbFetch('purchases', { method:'POST', body: JSON.stringify(rows) });
  toast('✅ Saved!');
  loadAndRender();
  go('home');
}

// --- NAVIGATION & INIT ---
function go(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
}
function setupGo(){
  setActive(document.getElementById('setup-inp').value.toUpperCase());
  document.getElementById('setup').classList.add('hidden');
  loadAndRender();
}
function onSetupInput(i){document.getElementById('setup-btn').disabled = i.value.length < 2;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

initApp();
async function initApp(){ if(getActive()) { document.getElementById('setup').classList.add('hidden'); loadAndRender(); } }


function renderInsights() {
  const c = document.getElementById('ins-c');
  const forecasts = forecast(_cache);
  const items = classify(_cache, forecasts);

  if (!items.length) {
    c.innerHTML = '<div class="loading-state"><div class="loading-text">No data yet.</div></div>';
    return;
  }

  const totalItems = items.length;
  const urgent = items.filter(i => i.bucket === 'cat-a').length;
  const soon = items.filter(i => i.bucket === 'cat-b').length;
  const okay = items.filter(i => i.bucket === 'cat-c').length;
  const safe = items.filter(i => i.bucket === 'safe').length;

  c.innerHTML = `
    <div class="hero" style="margin-top:14px">
      <div class="hero-eye">Insights</div>
      <div class="hero-h">${totalItems} products tracked</div>
      <div class="hero-sub">
        <span class="c-red">${urgent} urgent</span> · 
        <span class="c-ora">${soon} soon</span> · 
        <span class="c-amb">${okay} okay</span> · 
        <span class="c-grn">${safe} stocked</span>
      </div>
    </div>
    <div class="items">
      ${items.map(i => `
        <div class="item ${i.bucket}">
          <div class="ie">${em(i.name)}</div>
          <div class="ib">
            <div class="in">${i.name}</div>
            <div class="im">bought ${i.n}x · last ${i.lastBought}</div>
          </div>
          <div class="ir">
            <div class="dp ${i.bucket}">${i.daysLeft}d left</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
} 
</script>
</body>
</html>
